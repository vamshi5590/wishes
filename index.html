<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Women’s Day</title>
  <style>
    :root {
      --bg: #fff6fb;
      --primary: #b4005a;
      --accent: #ff5ca8;
      --text: #3a2a35;
    }
    html,body { height:100%; margin:0; }
    body {
      display:flex; align-items:center; justify-content:center; text-align:center;
      background: radial-gradient(1200px 800px at 20% 10%, #ffe4f1 0, #fff6fb 45%, #ffffff 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      color: var(--text);
      padding: 24px;
    }
    .card {
      background: #ffffffcc;
      backdrop-filter: blur(6px);
      border: 1px solid #ffd1e6;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(180,0,90,0.12);
      max-width: 680px;
      padding: 28px 28px 22px;
      position: relative;
      overflow: hidden;
    }
    h1 {
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      margin: 0 0 10px;
      color: var(--primary);
    }
    .name {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
    }
    p { margin: 8px 0 12px; font-size: clamp(15px, 2.4vw, 18px); }
    .tag {
      display:inline-block; padding: 8px 14px; border-radius: 999px;
      background: #ffe7f2; color: var(--primary); font-weight: 600; margin-bottom: 14px;
    }
    .footer { font-size: 13px; color: #6b5566; margin-top: 12px; }
    /* confetti */
    .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .c { position:absolute; width:10px; height:16px; opacity:.9; will-change: transform; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Happy International Women’s Day 🌸</div>
    <h1>Happy Women’s Day <span class="name"></span>!</h1>
    <p>Wishing you strength, joy, and success—today and every day. Thanks for inspiring the team! ✨</p>
    <div class="footer">Made with appreciation 💖</div>
  </div>
  <div class="confetti" id="confetti"></div>

  <script>
    // 👉 Set the name here (no URL parameter needed)
    const NAME = 'Anjali';  // <-- Change this to your colleague's name

    document.querySelector('.name').textContent = NAME;
    document.title = `Happy Women’s Day, ${NAME}!`;

    // simple confetti
    const colors = ['#b4005a','#ff5ca8','#ffccde','#f8a1c4','#8a2c5b','#ffd1e6'];
    const confetti = document.getElementById('confetti');
    const pieces = Math.min(120, Math.floor(window.innerWidth / 8));
    for (let i=0; i<pieces; i++) {
      const el = document.createElement('div');
      el.className = 'c';
      el.style.left = (Math.random() * 100) + 'vw';
      el.style.background = colors[i % colors.length];
      el.style.transform = `translateY(${-(Math.random()*100+20)}vh) rotate(${Math.random()*360}deg)`;
      confetti.appendChild(el);
      const duration = 4 + Math.random() * 4;
      const delay = Math.random() * 1.5;
      el.animate(
        [
          { transform: `translateY(-110vh) rotate(0deg)` },
          { transform: `translateY(110vh) rotate(${720 + Math.random()*360}deg)` }
        ],
        { duration: duration*1000, delay: delay*1000, iterations: 1, easing: 'ease-in' }
      );
      setTimeout(() => el.remove(), (duration+delay)*1000 + 100);
    }
  </script>
</body>
</html>
``
